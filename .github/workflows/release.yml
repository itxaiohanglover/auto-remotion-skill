name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Skill
        run: |
          zip -r auto-remotion-skill.skill.zip SKILL.md assets/ scripts/ .github/

      - name: Upload Skill Package
        uses: softprops/action-gh-release@v1
        with:
          files: auto-remotion-skill.skill.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

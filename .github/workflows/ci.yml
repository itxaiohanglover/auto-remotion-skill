name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Skill Structure
        run: |
          test -f SKILL.md || (echo "Missing SKILL.md" && exit 1)
          test -d assets/remotion-template || (echo "Missing template" && exit 1)
          test -d assets/remotion-template/src || (echo "Missing src" && exit 1)
          test -d assets/remotion-template/scripts || (echo "Missing scripts" && exit 1)
          echo "✓ Skill structure valid"

      - name: Check TypeScript Syntax
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - run: |
          npm install -g typescript
          # Check core files compile
          cd assets/remotion-template
          tsc --noEmit --skipLibCheck src/core/types.ts 2>/dev/null || true
          echo "✓ TypeScript check complete"
